# A fully populated Charter for a fictional design system named Citrine.
# Demonstrates every v1 field. Use as a reference, not a template — most real
# Charters will be smaller. Copy charter.minimal.yaml for a real starting point.

$schema: https://usecharter.dev/v1/charter.schema.json
name: Citrine
version: 1.4.0

tokens:
  color:
    # Brand
    primary:        { $value: "#f59e0b", $type: color }
    primary-hover:  { $value: "#d97706", $type: color }
    primary-active: { $value: "#b45309", $type: color }

    # Neutral
    surface:        { $value: "#ffffff", $type: color }
    surface-muted:  { $value: "#f9fafb", $type: color }
    text:           { $value: "#1f2937", $type: color }
    text-muted:     { $value: "#6b7280", $type: color }
    border:         { $value: "#e5e7eb", $type: color }

    # Status
    success:        { $value: "#10b981", $type: color }
    warning:        { $value: "#f59e0b", $type: color }
    danger:         { $value: "#ef4444", $type: color }

  spacing:
    "0":  { $value: "0",     $type: dimension }
    "1":  { $value: "4px",   $type: dimension }
    "2":  { $value: "8px",   $type: dimension }
    "3":  { $value: "12px",  $type: dimension }
    "4":  { $value: "16px",  $type: dimension }
    "6":  { $value: "24px",  $type: dimension }
    "8":  { $value: "32px",  $type: dimension }
    "12": { $value: "48px",  $type: dimension }
    "16": { $value: "64px",  $type: dimension }

  radius:
    sm:   { $value: "4px",  $type: dimension }
    md:   { $value: "8px",  $type: dimension }
    lg:   { $value: "12px", $type: dimension }
    full: { $value: "9999px", $type: dimension }

  typography:
    heading-1:
      $value:
        fontFamily: Inter
        fontWeight: "600"
        fontSize: "32px"
        lineHeight: "1.2"
      $type: typography
    heading-2:
      $value:
        fontFamily: Inter
        fontWeight: "600"
        fontSize: "24px"
        lineHeight: "1.3"
      $type: typography
    body:
      $value:
        fontFamily: Inter
        fontWeight: "400"
        fontSize: "16px"
        lineHeight: "1.5"
      $type: typography
    body-small:
      $value:
        fontFamily: Inter
        fontWeight: "400"
        fontSize: "14px"
        lineHeight: "1.5"
      $type: typography

  shadow:
    sm: { $value: "0 1px 2px rgba(0,0,0,0.05)",  $type: shadow }
    md: { $value: "0 4px 6px rgba(0,0,0,0.1)",   $type: shadow }
    lg: { $value: "0 10px 15px rgba(0,0,0,0.1)", $type: shadow }

components:
  registry: "@citrine/ui"
  allowed:
    - Button
    - Card
    - Input
    - Select
    - Checkbox
    - Radio
    - Text
    - Heading
    - Link
    - Alert
    - Badge
    - Avatar
    - Tooltip
    - Dialog
    - Tabs
    - Accordion
    - "Form/*"
  forbidden:
    - "div"
    - "span"

rules:
  delta_e_threshold: 2.0
  wcag_level: AA
  hardcoded_colors: error
  hardcoded_spacing: warn
  hardcoded_typography: warn
  off_token_typography: error
  unknown_components: error
  forbidden_components: error
  inline_styles: warn
  accessibility: error

profiles:
  prototype:
    rules:
      hardcoded_colors: warn
      hardcoded_spacing: off
      hardcoded_typography: off
      inline_styles: off
      wcag_level: A
  production:
    rules:
      hardcoded_colors: error
      hardcoded_spacing: error
      hardcoded_typography: error
      inline_styles: error
      wcag_level: AAA
      delta_e_threshold: 1.5

notes:
  visual_theme: |
    Citrine is warm and citrus-leaning. Primary is amber (#f59e0b), not
    orange — the orange-700 family looked muddy against the surface
    in early tests. The neutral ladder leans cool to provide contrast
    against the warm primary; do not mix in warm greys.

  typography: |
    Inter at the four declared scales. No other weights or sizes are
    permitted in production; if a design calls for a new size, add a
    new typography token here first.

  accessibility: |
    AA is the floor. The primary/surface pair must clear 4.5:1 contrast
    on both light and dark surfaces. We test contrast in CI on every PR.
    The 'accessibility' rule is set to error and stays there.

  brand_voice: |
    Citrine is friendly, direct, and confident. Microcopy uses sentence
    case (not Title Case). Error messages never start with "Oops" or
    "Sorry" — they state what happened and what to do.

  reference_implementation: |
    Audited by Flint (https://github.com/Jtiem/Lunar-Elevator-Bridge).
    A Charter-aware linter that enforces these rules at the AST level
    on every PR.
